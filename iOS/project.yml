name: SneakerShelf
options:
  bundleIdPrefix: com.shimondeitel.sneakershelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SneakerShelf:
    type: application
    platform: iOS
    sources:
      - path: SneakerShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sneakershelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SneakerShelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SneakerShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SneakerShelfTests
      - path: SneakerShelf.storekit
    dependencies:
      - target: SneakerShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sneakershelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SneakerShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SneakerShelfUITests
    dependencies:
      - target: SneakerShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sneakershelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SneakerShelf:
    build:
      targets:
        SneakerShelf: all
        SneakerShelfTests: [test]
        SneakerShelfUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SneakerShelf.storekit
    test:
      config: Debug
      storeKitConfiguration: SneakerShelf.storekit
      targets:
        - SneakerShelfTests
        - SneakerShelfUITests
    archive:
      config: Release
